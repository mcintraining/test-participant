<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบรายชื่อผู้เข้าร่วม</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 15px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 35px 30px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header .emoji { font-size: 48px; }
        .header h1 { color: #333; font-size: 22px; margin-top: 8px; }
        .header p { color: #999; font-size: 13px; margin-top: 5px; }

        .data-status {
            text-align: center; padding: 10px;
            border-radius: 8px; font-size: 13px; margin-bottom: 20px;
        }
        .data-status.loading { background: #fff8e1; color: #f57f17; }
        .data-status.success { background: #e8f5e9; color: #2e7d32; }
        .data-status.error   { background: #fce4ec; color: #c62828; }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input {
            width: 100%; padding: 16px 20px 16px 48px;
            border: 2px solid #e0e0e0; border-radius: 50px;
            font-size: 17px; outline: none; transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }
        .search-box .icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); font-size: 20px;
        }

        .results { max-height: 400px; overflow-y: auto; }

        .result-item {
            display: flex; align-items: center;
            padding: 14px 16px; border-radius: 12px;
            margin-bottom: 8px; animation: slideIn 0.3s ease;
        }
        .result-item.found {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-left: 5px solid #4caf50;
        }
        .result-item.not-found {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            border-left: 5px solid #e91e63;
        }

        .result-item .status-icon { font-size: 28px; margin-right: 14px; }
        .result-item .name { font-size: 16px; font-weight: 700; color: #333; }
        .result-item .status-text { font-size: 13px; color: #555; margin-top: 2px; }

        .highlight {
            background: #fff176; padding: 1px 4px;
            border-radius: 4px; font-weight: bold;
        }

        .count-info {
            text-align: center; color: #888;
            font-size: 13px; margin-top: 12px;
        }

        .no-result { text-align: center; padding: 35px; color: #aaa; }
        .no-result .big-icon { font-size: 40px; margin-bottom: 10px; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to   { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="emoji">📋</div>
        <h1>ตรวจสอบรายชื่อผู้เข้าร่วม</h1>
        <p>พิมพ์ชื่อเพื่อค้นหาว่าได้เข้าร่วมกิจกรรมหรือไม่</p>
    </div>

    <div class="data-status loading" id="dataStatus">
        ⏳ กำลังโหลดข้อมูล...
    </div>

    <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput"
            placeholder="พิมพ์ชื่อที่ต้องการค้นหา..."
            autocomplete="off" disabled>
    </div>

    <div class="results" id="results">
        <div class="no-result">
            <div class="big-icon">🔎</div>
            รอโหลดข้อมูล...
        </div>
    </div>
    <div class="count-info" id="countInfo"></div>
</div>

<script>
// ============================================================
// 📌📌📌 ใส่ลิงก์ Google Sheets CSV ตรงนี้! 📌📌📌
// ============================================================
const SHEET_CSV_URL = 'https://corsproxy.io/?' + encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vTt_zzCB_LJuySoWgJ-0z8vc28N_QZ8rt8_WsJs9-C_eghJWma3fEE214ZkAKKQuORysjk-p7LcSjXJ/pub?output=csv');
    
// const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTt_zzCB_LJuySoWgJ-0z8vc28N_QZ8rt8_WsJs9-C_eghJWma3fEE214ZkAKKQuORysjk-p7LcSjXJ/pub?output=csv');
// link csv จาก google sheets
  
// ============================================================

let participants = [];
const searchInput = document.getElementById('searchInput');
const resultsDiv  = document.getElementById('results');
const countInfo   = document.getElementById('countInfo');
const dataStatus  = document.getElementById('dataStatus');

// --- โหลดข้อมูล ---
async function loadData() {
    try {
        const res  = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        participants = parseCSV(text);

        dataStatus.className = 'data-status success';
        dataStatus.textContent = '✅ โหลดสำเร็จ (' + participants.length + ' รายชื่อ)';
        searchInput.disabled = false;
        searchInput.focus();

        resultsDiv.innerHTML =
            '<div class="no-result"><div class="big-icon">⌨️</div>พิมพ์ชื่อเพื่อเริ่มค้นหา</div>';

        setTimeout(function(){ dataStatus.style.display = 'none'; }, 2000);

    } catch (e) {
        dataStatus.className = 'data-status error';
        dataStatus.textContent = '❌ โหลดไม่สำเร็จ - ตรวจสอบลิงก์ CSV';
    }
}

// --- แปลง CSV ---
function parseCSV(csv) {
    var lines = csv.trim().split('\n');
    var result = [];
    for (var i = 1; i < lines.length; i++) {
        var cols = lines[i].split(',');
        var name = (cols || '').trim().replace(/"/g, '');
        var status = (cols || 'เข้าร่วม').trim().replace(/"/g, '');
        if (name) result.push({ name: name, status: status });
    }
    return result;
}

// --- ค้นหา ---
searchInput.addEventListener('input', function() {
    var query = this.value.trim();

    if (!query) {
        resultsDiv.innerHTML =
            '<div class="no-result"><div class="big-icon">⌨️</div>พิมพ์ชื่อเพื่อเริ่มค้นหา<br><small style="color:#bbb">รายชื่อทั้งหมด ' + participants.length + ' คน</small></div>';
        countInfo.textContent = '';
        return;
    }

    var matched = participants.filter(function(p) {
        return p.name.indexOf(query) !== -1;
    });

    if (matched.length > 0) {
        resultsDiv.innerHTML = matched.map(function(p) {
            var hl = p.name.replace(query, '<span class="highlight">' + query + '</span>');
            return '<div class="result-item found">' +
                '<span class="status-icon">✅</span>' +
                '<div><div class="name">' + hl + '</div>' +
                '<div class="status-text">✔ ได้' + p.status + 'กิจกรรมแล้ว</div></div></div>';
        }).join('');
        countInfo.textContent = 'พบ ' + matched.length + ' คน จากทั้งหมด ' + participants.length + ' คน';
    } else {
        resultsDiv.innerHTML =
            '<div class="result-item not-found">' +
            '<span class="status-icon">❌</span>' +
            '<div><div class="name">"' + query + '"</div>' +
            '<div class="status-text">ไม่พบในรายชื่อผู้เข้าร่วม</div></div></div>';
        countInfo.textContent = '';
    }
});

loadData();
</script>
</body>
</html>
