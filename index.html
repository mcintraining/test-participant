<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบรายชื่อผู้เข้าร่วม</title>
    <link rel="icon" href="data:,">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 15px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 35px 30px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
        }

        .header { text-align: center; margin-bottom: 25px; }
        .header .emoji { font-size: 48px; }
        .header h1 { color: #333; font-size: 22px; margin-top: 8px; }
        .header p { color: #999; font-size: 13px; margin-top: 5px; }

        .data-status {
            text-align: center; padding: 10px;
            border-radius: 8px; font-size: 13px; margin-bottom: 20px;
        }
        .data-status.loading { background: #fff8e1; color: #f57f17; }
        .data-status.success { background: #e8f5e9; color: #2e7d32; }
        .data-status.error   { background: #fce4ec; color: #c62828; }

        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input {
            width: 100%; padding: 16px 20px 16px 48px;
            border: 2px solid #e0e0e0; border-radius: 50px;
            font-size: 17px; outline: none; transition: all 0.3s;
        }
        .search-box input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.15);
        }
        .search-box .icon {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); font-size: 20px;
        }

        .results { max-height: 400px; overflow-y: auto; }

        .result-item {
            display: flex; align-items: center;
            padding: 14px 16px; border-radius: 12px;
            margin-bottom: 8px; animation: slideIn 0.3s ease;
        }

        /* ✅ ผ่าน - สีเขียว */
        .result-item.passed {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            border-left: 5px solid #4caf50;
        }

        /* ❌ ไม่ผ่าน - สีแดง */
        .result-item.failed {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            border-left: 5px solid #e91e63;
        }

        /* ⚠️ ไม่มีชื่อ - สีเหลือง */
        .result-item.no-data {
            background: linear-gradient(135deg, #fff8e1, #ffecb3);
            border-left: 5px solid #ffc107;
        }

        .result-item .status-icon { font-size: 28px; margin-right: 14px; }
        .result-item .name { font-size: 16px; font-weight: 700; color: #333; }
        .result-item .status-text { font-size: 13px; margin-top: 2px; }

        .status-text.pass-text  { color: #2e7d32; }
        .status-text.fail-text  { color: #c62828; }
        .status-text.nodata-text { color: #f57f17; }

        .highlight {
            background: #fff176; padding: 1px 4px;
            border-radius: 4px; font-weight: bold;
        }

        .count-info {
            text-align: center; color: #888;
            font-size: 13px; margin-top: 12px;
        }

        .no-result { text-align: center; padding: 35px; color: #aaa; }
        .no-result .big-icon { font-size: 40px; margin-bottom: 10px; }

        /* Legend */
        .legend {
            display: flex; justify-content: center; gap: 15px;
            margin-bottom: 20px; font-size: 12px; color: #888;
        }
        .legend span {
            display: flex; align-items: center; gap: 4px;
        }
        .dot {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block;
        }
        .dot.green  { background: #4caf50; }
        .dot.red    { background: #e91e63; }
        .dot.yellow { background: #ffc107; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-15px); }
            to   { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="emoji">📋</div>
        <h1>ตรวจสอบรายชื่อผู้เข้าร่วม</h1>
        <p>พิมพ์ชื่อเพื่อค้นหาว่าได้เข้าร่วมกิจกรรมหรือไม่</p>
    </div>

    <!-- สัญลักษณ์อธิบาย -->
    <div class="legend">
        <span><span class="dot green"></span> ผ่าน</span>
        <span><span class="dot red"></span> ไม่ผ่าน</span>
        <span><span class="dot yellow"></span> ไม่มีข้อมูล</span>
    </div>

    <div class="data-status loading" id="dataStatus">
        ⏳ กำลังโหลดข้อมูล...
    </div>

    <div class="search-box">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput"
            placeholder="พิมพ์ชื่อที่ต้องการค้นหา..."
            autocomplete="off" disabled>
    </div>

    <div class="results" id="results">
        <div class="no-result">
            <div class="big-icon">🔎</div>
            รอโหลดข้อมูล...
        </div>
    </div>
    <div class="count-info" id="countInfo"></div>
</div>

<script>
// ============================================================
// 📌 ใส่ลิงก์ Apps Script ตรงนี้!
// ============================================================
var API_URL = 'https://script.google.com/macros/s/AKfycbzpCZqFoO_MECMQzOjocv0wr1dmKzZeREvhzZIamXnoXjw1i8aPWRCQOdGqxry3asMRjg/exec';
// ============================================================

var participants = [];
var searchInput = document.getElementById('searchInput');
var resultsDiv  = document.getElementById('results');
var countInfo   = document.getElementById('countInfo');
var dataStatus  = document.getElementById('dataStatus');

// --- โหลดข้อมูล ---
fetch(API_URL)
    .then(function(res) { return res.json(); })
    .then(function(data) {
        participants = data;
        console.log('โหลดได้', participants.length, 'รายชื่อ');
        console.log('ตัวอย่าง:', participants.slice(0, 3));

        dataStatus.className = 'data-status success';
        dataStatus.textContent = '✅ โหลดสำเร็จ (' + participants.length + ' รายชื่อ)';
        searchInput.disabled = false;
        searchInput.focus();

        resultsDiv.innerHTML = '<div class="no-result"><div class="big-icon">⌨️</div>พิมพ์ชื่อเพื่อเริ่มค้นหา</div>';

        setTimeout(function() { dataStatus.style.display = 'none'; }, 2000);
    })
    .catch(function(err) {
        console.error('Error:', err);
        dataStatus.className = 'data-status error';
        dataStatus.textContent = '❌ โหลดไม่สำเร็จ - ตรวจสอบลิงก์ API';
    });

// --- ค้นหา ---
searchInput.addEventListener('input', function() {
    var query = this.value.trim();

    if (!query) {
        resultsDiv.innerHTML =
            '<div class="no-result">' +
            '<div class="big-icon">⌨️</div>พิมพ์ชื่อเพื่อเริ่มค้นหา<br>' +
            '<small style="color:#bbb">รายชื่อทั้งหมด ' + participants.length + ' คน</small></div>';
        countInfo.textContent = '';
        return;
    }

    // กรองชื่อที่ตรง
    var matched = participants.filter(function(p) {
        return p.name.indexOf(query) !== -1;
    });

    if (matched.length > 0) {
        // ✅ เจอชื่อ → เช็คว่าผ่านหรือไม่ผ่าน
        resultsDiv.innerHTML = matched.map(function(p) {
            var hl = p.name.replace(
                query, '<span class="highlight">' + query + '</span>'
            );

            if (p.passed) {
                // ✅ ผ่าน - สีเขียว
                return '<div class="result-item passed">' +
                    '<span class="status-icon">✅</span>' +
                    '<div>' +
                    '<div class="name">' + hl + '</div>' +
                    '<div class="status-text pass-text">ผ่านการอบรม</div>' +
                    '</div></div>';
            } else {
                // ❌ ไม่ผ่าน - สีแดง
                return '<div class="result-item failed">' +
                    '<span class="status-icon">❌</span>' +
                    '<div>' +
                    '<div class="name">' + hl + '</div>' +
                    '<div class="status-text fail-text">ไม่ผ่านการอบรม</div>' +
                    '</div></div>';
            }
        }).join('');

        var passCount = matched.filter(function(p){ return p.passed; }).length;
        var failCount = matched.length - passCount;
        countInfo.textContent = 'พบ ' + matched.length + ' คน (ผ่าน ' + passCount + ' / ไม่ผ่าน ' + failCount + ')';

    } else {
        // ⚠️ ไม่มีชื่อเลย - สีเหลือง
        resultsDiv.innerHTML =
            '<div class="result-item no-data">' +
            '<span class="status-icon">⚠️</span>' +
            '<div>' +
            '<div class="name">"' + query + '"</div>' +
            '<div class="status-text nodata-text">ไม่มีข้อมูลในระบบ</div>' +
            '</div></div>';
        countInfo.textContent = '';
    }
});
</script>

</body>
</html>
